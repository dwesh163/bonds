---
apiVersion: v1
kind: Secret
metadata:
  name: bonds-secret
  namespace: my-namespace
type: Opaque
stringData:
  RESTIC_REPOSITORY: "s3:https://s3.epfl.ch/my-bucket"
  RESTIC_PASSWORD: "changeme"
  AWS_ACCESS_KEY_ID: "changeme"
  AWS_SECRET_ACCESS_KEY: "changeme"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bonds-backup
  namespace: my-namespace
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: bonds
              image: ghcr.io/epfl-si/bonds:latest
              env:
                - name: BACKUP_PATH
                  value: /data
                - name: BACKUP_TAG
                  value: my-pvc
                - name: RETENTION_KEEP_LAST
                  value: "7"
                - name: RESTIC_REPOSITORY
                  valueFrom:
                    secretKeyRef:
                      name: bonds-secret
                      key: RESTIC_REPOSITORY
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: bonds-secret
                      key: RESTIC_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: bonds-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: bonds-secret
                      key: AWS_SECRET_ACCESS_KEY
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: my-pvc
